name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit and component tests
        run: bun run test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Preview build — demo login buttons enabled
      - name: Build for preview
        if: github.event_name == 'pull_request'
        run: bunx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_ENABLE_DEV_BYPASS: "true"
          NEXT_PUBLIC_DEMO_ADMIN_EMAIL: ${{ secrets.NEXT_PUBLIC_DEMO_ADMIN_EMAIL }}
          NEXT_PUBLIC_DEMO_APPLICANT_EMAIL: ${{ secrets.NEXT_PUBLIC_DEMO_APPLICANT_EMAIL }}
          NEXT_PUBLIC_DEMO_PASSWORD: ${{ secrets.NEXT_PUBLIC_DEMO_PASSWORD }}

      # Production build — demo login buttons excluded
      - name: Build for production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bunx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_ENABLE_DEV_BYPASS: "false"

      # ── PR: deploy to a per-PR preview worker ────────────────────────────────
      - name: Deploy preview worker
        id: deploy_preview
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=uwc-platforms-pr-${{ github.event.pull_request.number }}
          secrets: |
            SUPABASE_SECRET_KEY
            GEMINI_API_KEY
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            RESEND_FROM_NAME
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}

      # Post or update a single comment on the PR with the preview URL
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const workerName = `uwc-platforms-pr-${prNumber}`;
            const deploymentUrl = '${{ steps.deploy_preview.outputs.deployment-url }}';
            const url = deploymentUrl || `https://${workerName}.workers.dev`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              '## Preview deployment',
              '',
              `| | |`,
              `|---|---|`,
              `| **URL** | ${url} |`,
              `| **Worker** | \`${workerName}\` |`,
              `| **Commit** | \`${sha}\` |`,
              '',
              '_Updated on every push to this PR. Deleted when the PR is merged or closed._',
            ].join('\n');

            const marker = '## Preview deployment';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      # ── main: deploy to production worker ────────────────────────────────────
      - name: Deploy to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=uwc-platforms
          secrets: |
            SUPABASE_SECRET_KEY
            GEMINI_API_KEY
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            RESEND_FROM_NAME
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
